<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #f1f6f8;
      --ink: #14212b;
      --muted: #48606f;
      --card: #ffffff;
      --accent: #005b68;
      --line: #c9d6dc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ecfeff 0%, #fefce8 100%);
      color: var(--ink);
      font-family: "Avenir Next", "Gill Sans", "Segoe UI", sans-serif;
      padding: 1rem;
    }

    .panel {
      width: min(640px, 95vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(20, 33, 43, 0.08);
      padding: 1.2rem;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
    }

    .subtitle {
      margin: 0.6rem 0 1rem;
      color: var(--muted);
    }

    #qrcode {
      margin: 0 auto;
      display: inline-block;
      padding: 0.8rem;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
    }

    .url {
      margin-top: 1rem;
      word-break: break-all;
      font-size: 0.95rem;
      color: #0f172a;
      background: #f8fafc;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 0.8rem;
    }

    .actions {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 0.55rem 0.85rem;
      font-weight: 600;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1 id="title">Activity Inbox QR</h1>
    <p class="subtitle" id="subtitle">Scan to open this activity in inbox.html</p>
    <div id="qrcode" aria-label="QR code for activity inbox URL"></div>
    <div class="url">
      <a id="urlText" href="#"></a>
    </div>
    <div class="actions">
      <a id="openInbox" class="btn" href="#">Open Inbox</a>
      <a class="btn btn-secondary" href="index.html">Back to Activities</a>
    </div>
  </main>

  <script>
    async function loadCatalog() {
      const response = await fetch('activities.json', { cache: 'no-store' });
      if (!response.ok) throw new Error('Unable to load activities catalog');
      return response.json();
    }

    function parseEntry(catalog, name) {
      const activities = catalog && catalog.activities;
      if (!activities) return null;

      if (Array.isArray(activities)) {
        return activities.find((entry) => entry && entry.name === name) || null;
      }

      const entry = activities[name];
      if (!entry) return null;
      if (typeof entry === 'string') return { baseUrl: entry };
      return entry;
    }

    async function loadSettings(baseUrl) {
      const settingsUrl = new URL('settings.json', new URL(baseUrl, window.location.href)).toString();
      const response = await fetch(settingsUrl, { cache: 'no-store' });
      if (!response.ok) return null;
      return response.json();
    }

    function buildInboxUrl(activityName) {
      return new URL(`inbox.html?activity=${encodeURIComponent(activityName)}`, window.location.href).toString();
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const activity = params.get('activity') || 'artic-table-top';

      let settings = null;
      try {
        const catalog = await loadCatalog();
        const entry = parseEntry(catalog, activity);
        if (entry && (entry.baseUrl || entry.base || entry.url)) {
          settings = await loadSettings(entry.baseUrl || entry.base || entry.url);
        }
      } catch (err) {
        // Keep defaults if catalog/settings loading fails.
      }

      const activityTitle = (settings && settings.title) ? settings.title : `Activity: ${activity}`;
      const inboxUrl = buildInboxUrl(activity);

      document.getElementById('title').textContent = activityTitle;
      document.getElementById('subtitle').textContent = `Scan to open ${activity} in inbox.html`;

      const urlText = document.getElementById('urlText');
      urlText.href = inboxUrl;
      urlText.textContent = inboxUrl;

      const openInbox = document.getElementById('openInbox');
      openInbox.href = inboxUrl;

      QRCode.toCanvas(document.createElement('canvas'), inboxUrl, {
        width: 300,
        margin: 2,
        color: {
          dark: '#111827',
          light: '#ffffff'
        }
      }, (error, canvas) => {
        if (error) {
          const qrcodeEl = document.getElementById('qrcode');
          qrcodeEl.textContent = 'Unable to render QR code.';
          return;
        }
        const qrcodeEl = document.getElementById('qrcode');
        qrcodeEl.innerHTML = '';
        qrcodeEl.appendChild(canvas);
      });
    }

    init();
  </script>
</body>
</html>
