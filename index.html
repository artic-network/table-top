<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogspawn Activities</title>
  <style>
    :root {
      --bg: #f4f2ea;
      --ink: #182025;
      --muted: #44525d;
      --card: #fffef8;
      --accent: #005b68;
      --accent-2: #9a3412;
      --line: #d6d0bf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Gill Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, #fff8dc 0%, transparent 30%),
        radial-gradient(circle at 90% 80%, #dbeafe 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1080px, 92vw);
      margin: 0 auto;
      padding: 2.5rem 0 3rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0.8rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 72ch;
      line-height: 1.5;
    }

    .grid {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 4px 12px rgba(24, 32, 37, 0.06);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .badge {
      width: fit-content;
      background: rgba(0, 91, 104, 0.1);
      color: var(--accent);
      border: 1px solid rgba(0, 91, 104, 0.25);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 0.3rem 0.55rem;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: 1.2rem;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      min-height: 3.3em;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: auto;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid var(--accent);
      color: white;
      background: var(--accent);
      font-weight: 600;
      padding: 0.58rem 0.85rem;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn-secondary {
      background: white;
      color: var(--accent-2);
      border-color: var(--accent-2);
    }

    .status {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .error {
      color: #8b1e3f;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Frogspawn Activity Launcher</h1>
    <p class="subtitle">
      Choose an activity to launch the participant inbox or open a QR landing page for quick mobile access.
      Activities are loaded from <code>activities.json</code> and each card pulls details from its activity settings file.
    </p>

    <section id="activityGrid" class="grid" aria-live="polite"></section>
    <p id="status" class="status">Loading activities...</p>
  </main>

  <script>
    function toAbsolute(value) {
      return new URL(value, window.location.href).toString();
    }

    function ensureTrailingSlash(value) {
      return value.endsWith('/') ? value : `${value}/`;
    }

    function parseActivities(catalog) {
      const items = catalog && catalog.activities;
      if (!items) return [];

      if (Array.isArray(items)) {
        return items
          .filter((entry) => entry && entry.name)
          .map((entry) => ({
            name: entry.name,
            baseUrl: entry.baseUrl || entry.base || entry.url || `activities/${entry.name}/`,
            statusUrl: entry.statusUrl || entry.status || ''
          }));
      }

      return Object.entries(items).map(([name, entry]) => {
        if (typeof entry === 'string') {
          return { name, baseUrl: entry, statusUrl: '' };
        }
        return {
          name,
          baseUrl: (entry && (entry.baseUrl || entry.base || entry.url)) || `activities/${name}/`,
          statusUrl: (entry && (entry.statusUrl || entry.status)) || ''
        };
      });
    }

    async function fetchCatalog() {
      const response = await fetch('activities.json', { cache: 'no-store' });
      if (!response.ok) throw new Error(`Could not load activities catalog (${response.status})`);
      return response.json();
    }

    async function fetchSettings(baseUrl) {
      const settingsUrl = new URL('settings.json', ensureTrailingSlash(toAbsolute(baseUrl))).toString();
      const response = await fetch(settingsUrl, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Could not load settings (${response.status})`);
      return response.json();
    }

    function buildCard(activity, settings) {
      const card = document.createElement('article');
      card.className = 'card';

      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = activity.name;

      const title = document.createElement('h2');
      title.className = 'title';
      title.textContent = settings.title || activity.name;

      const desc = document.createElement('p');
      desc.className = 'desc';
      desc.textContent = settings.description || 'No description available.';

      const meta = document.createElement('p');
      meta.className = 'meta';
      const location = settings.location ? `Location: ${settings.location}` : 'Location not specified';
      const startDate = settings.date ? `Start date: ${settings.date}` : 'Start date not specified';
      meta.textContent = `${location} | ${startDate}`;

      const actions = document.createElement('div');
      actions.className = 'actions';

      const inboxHref = `inbox.html?activity=${encodeURIComponent(activity.name)}`;
      const qrHref = `activity-qr.html?activity=${encodeURIComponent(activity.name)}`;

      const openBtn = document.createElement('a');
      openBtn.className = 'btn';
      openBtn.href = inboxHref;
      openBtn.textContent = 'Open Inbox';

      const qrBtn = document.createElement('a');
      qrBtn.className = 'btn btn-secondary';
      qrBtn.href = qrHref;
      qrBtn.textContent = 'Open QR Page';

      actions.appendChild(openBtn);
      actions.appendChild(qrBtn);
      card.appendChild(badge);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(meta);
      card.appendChild(actions);

      return card;
    }

    async function init() {
      const grid = document.getElementById('activityGrid');
      const status = document.getElementById('status');

      try {
        const catalog = await fetchCatalog();
        const activities = parseActivities(catalog);

        if (activities.length === 0) {
          status.textContent = 'No activities were found in activities.json.';
          status.classList.add('error');
          return;
        }

        const cards = await Promise.all(
          activities.map(async (activity) => {
            try {
              const settings = await fetchSettings(activity.baseUrl);
              return buildCard(activity, settings);
            } catch (err) {
              return buildCard(activity, {
                title: activity.name,
                description: `Unable to load activity settings from ${activity.baseUrl}.`,
                location: '',
                date: ''
              });
            }
          })
        );

        cards.forEach((card) => grid.appendChild(card));
        status.textContent = `Loaded ${cards.length} activities.`;
      } catch (err) {
        status.textContent = err.message;
        status.classList.add('error');
      }
    }

    init();
  </script>
</body>
</html>
